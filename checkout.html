<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8K SHOP | إتمام الدفع 💳</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --neon-blue: #00f2ff; --dark: #020205; }
        body { font-family: 'Cairo', sans-serif; background: var(--dark); color: #fff; margin: 0; padding: 20px; text-align: center; }
        .pay-container { max-width: 600px; margin: 40px auto; background: rgba(255,255,255,0.02); border: 1px solid var(--neon-blue); padding: 30px; border-radius: 25px; box-shadow: 0 0 30px rgba(0,242,255,0.1); }
        .summary { text-align: right; background: rgba(255,255,255,0.05); padding: 20px; border-radius: 15px; margin-bottom: 20px; }
        .iban-box { background: #000; border: 1px dashed var(--neon-blue); padding: 15px; border-radius: 10px; margin: 20px 0; cursor: pointer; }
        .iban-box:active { background: #111; }
        input[type="file"] { margin: 20px 0; color: var(--neon-blue); }
        .confirm-btn { background: var(--neon-blue); color: #000; border: none; padding: 15px 40px; border-radius: 50px; font-weight: 900; cursor: pointer; width: 100%; font-size: 1.1rem; }
        .step { color: var(--neon-blue); font-weight: bold; margin-top: 20px; display: block; }
    </style>
</head>
<body>

<div class="pay-container">
    <h2>فاتورة الطلب 🧾</h2>
    
    <div class="summary" id="order-summary">
        </div>

    <hr style="border: 0.5px solid rgba(0,242,255,0.2);">

    <span class="step">الخطوة 1: حول المبلغ للحساب التالي</span>
    <div class="iban-box" onclick="copyIBAN()">
        <small>اضغط للنسخ 📋</small>
        <p id="iban-text">SA00 0000 0000 0000 0000 0000</p>
        <strong>الاسم: [اكتب اسمك هنا]</strong>
    </div>

    <span class="step">الخطوة 2: ارفق صورة الإيصال</span>
    <input type="file" id="receipt" accept="image/*">

    <button class="confirm-btn" onclick="finishPayment()">تأكيد وإرسال عبر واتساب</button>
</div>

<script>
    // جلب البيانات من الصفحة السابقة
    const cart = JSON.parse(localStorage.getItem('cart'));
    const total = localStorage.getItem('total');
    const summaryDiv = document.getElementById('order-summary');

    if (!cart) { window.location.href = 'index.html'; }

    let summaryText = "الخدمات المختارة:\n";
    for (let k in cart) {
        let qty = cart[k].quantity > 1 ? ` x${cart[k].quantity}` : "";
        summaryDiv.innerHTML += `<p>• ${k}${qty} - <span style="color:var(--neon-blue)">${cart[k].total_price} ريال</span></p>`;
        summaryText += `- ${k}${qty}\n`;
    }
    summaryDiv.innerHTML += `<h3 style="text-align:center">الإجمالي: ${total} ريال</h3>`;

    function copyIBAN() {
        const text = document.getElementById('iban-text').innerText;
        navigator.clipboard.writeText(text);
        alert("تم نسخ الآيبان ✅");
    }

    function finishPayment() {
        const receiptFile = document.getElementById('receipt').files[0];
        if (!receiptFile) {
            alert("الرجاء إرفاق صورة الإيصال أولاً ⚠️");
            return;
        }

        let msg = `مرحباً 8K SHOP\nتم تحويل المبلغ وجاهز للطلب:\n\n${summaryText}\nالإجمالي: ${total} ريال\n\n(سأقوم بإرفاق صورة الإيصال الآن)`;
        
        // فتح الواتساب
        window.open(`https://wa.me/966533702434?text=${encodeURIComponent(msg)}`, '_blank');
    }
</script>
</body>
</html>
